<!--
You might want to add additional HTML elements to ST. It's good practice to separate it out from your code
-->
<div class="example-extension-settings">
	<div class="inline-drawer">
		<div class="inline-drawer-toggle inline-drawer-header">
			<b>Kofe Script</b>
			<div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
		</div>
		<div id="kofe-script-settings-window" class="inline-drawer-content" style="padding: 0.5vh;">

			<div class="flex-container flex-column separator-bottom">
				<b>Settings</b>

				<label class="flex-container">
					<input id="kofe-script-activate-extension" kofe-script-setting="enabled" type="checkbox" />
					Enable/Disable the extension
				</label>

				<label class="flex-container">
					<input id="kofe-script-show-warnings" kofe-script-setting="show_warnings" type="checkbox" />
					Show error warnings
				</label>
			</div>
			
			<div class="flex-container flex-column separator-bottom">
				<b>Macros</b>
				
				<label class="flex-container">
					<input id="kofe-script-experimetal-macro-engine" kofe-script-setting="macros/experimental_macro_engine" type="checkbox" />
					Use Macros 2.0 experimental enginge
				</label>

				<label class="flex-container">
					<input id="kofe-script-collapse-multiple-newlines" kofe-script-setting="macros/collapse_multiple_newlines" type="checkbox" />
					Collapse multiple newlines when sorting text with <code>{{sorttext}}</code>
				</label>
			</div>

			<div class="flex-container flex-column separator-bottom">
				<b>Debug settings</b>

				<div class="flex-container">
					<input id="kofe-script-check-configuration" class="menu_button" type="button" value="Check Configuration" />
					Print the configuration values ​​through the console
				</div>

				<label class="flex-container">
					<input id="kofe-script-activate-debug" kofe-script-setting="debug" type="checkbox" />
					Enable/Disable the debug console logs
				</label>
			</div>
		</div>
	</div>
</div>
